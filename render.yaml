services:
  # Backend API Service
  - type: web
    name: queue-system-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Queue System <noreply@render-app.com>
      - key: FRONTEND_URL
        sync: false

  # Frontend Service
  - type: web
    name: queue-system-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend/vite-project && npm install && npm run build
    publishPath: frontend/vite-project/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://queue-system-api.onrender.com
